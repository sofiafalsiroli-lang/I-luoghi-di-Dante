<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#ffffff"/>


  <!-- Cappuccio -->
  <path d="M24 8
                    C40 10, 50 22, 48 36
                    C46 50, 36 58, 22 56
                    L22 44
                    C30 44, 38 38, 38 30
                    C38 20, 30 16, 24 16 Z"
              fill="#b22222"/>

  <!-- Riempimento rosso tra volto e cappuccio -->
  <path d="M24 16
                    C30 16, 38 20, 38 30
                    C38 38, 30 44, 22 44
                    L22 16
                    Z"
              fill="#b22222"/>

  <!-- Volto -->
  <path d="M24 16
           C18 16, 12 22, 12 28
           C12 31, 14 33, 18 34
           C14 36, 12 38, 12 42
           C12 48, 18 52, 24 50
           Z"
        fill="#f2c9a0"/>

  <!-- Naso (più realistico) -->
  <path d="M18 27
           C14 29, 14 33, 18 34
           C16 32, 16 30, 18 27 Z"
        fill="#d8a07a"/>

  <!-- Occhio -->
  <circle cx="17.5" cy="26.5" r="1.3" fill="#000"/>

  <!-- Sopracciglio -->
  <path d="M16 24.5 C18 23.5, 20 23.5, 21 24.5"
        stroke="#5a3b2e" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Bocca -->
  <path d="M16 40 C18 41, 20 41, 22 40"
        stroke="#8b5a3c" stroke-width="1.2" fill="none" stroke-linecap="round"/>


      <!-- Alloro (corona verde) estesa lungo il cappuccio -->
      <path d="M26 14 C22 10, 18 14, 20 18" stroke="#228B22" stroke-width="2.5" fill="none"/>
      <path d="M28 12 C25 8, 21 12, 23 16" stroke="#228B22" stroke-width="2" fill="none"/>
      <path d="M30 16 C28 12, 24 14, 26 18" stroke="#228B22" stroke-width="2" fill="none"/>
      <path d="M32 18 C30 14, 26 16, 28 20" stroke="#228B22" stroke-width="1.5" fill="none"/>
      <path d="M34 20 C32 16, 28 18, 30 22" stroke="#228B22" stroke-width="1.5" fill="none"/>
      <!-- Estensione foglie lungo il cappuccio -->
      <path d="M36 24 C34 20, 30 22, 32 26" stroke="#228B22" stroke-width="1.5" fill="none"/>
      <path d="M38 28 C36 24, 32 26, 34 30" stroke="#228B22" stroke-width="1.5" fill="none"/>
      <path d="M40 32 C38 28, 34 30, 36 34" stroke="#228B22" stroke-width="1.5" fill="none"/>
      <path d="M42 36 C40 32, 36 34, 38 38" stroke="#228B22" stroke-width="1.5" fill="none"/>
      <path d="M44 40 C42 36, 38 38, 40 42" stroke="#228B22" stroke-width="1.5" fill="none"/>
      <path d="M46 44 C44 40, 40 42, 42 46" stroke="#228B22" stroke-width="1.5" fill="none"/>
      <path d="M48 48 C46 44, 42 46, 44 50" stroke="#228B22" stroke-width="1.5" fill="none"/>
           C30 12, 36 12, 40 14"
        fill="none" stroke="#2e7d32" stroke-width="2" stroke-linecap="round"/>

  <!-- Foglioline -->
  <circle cx="30" cy="13" r="0.8" fill="#2e7d32"/>
  <circle cx="34" cy="13" r="0.8" fill="#2e7d32"/>
  <circle cx="38" cy="14" r="0.8" fill="#2e7d32"/>
</svg>